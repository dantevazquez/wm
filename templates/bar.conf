# ==============================================================================
# Monowm Bar Configuration (bar.conf)
# ==============================================================================

# General Bar Settings
bar_enabled = 1
bar_height = 24
bar_font_name = JetBrainsMono Nerd Font
bar_font_size = 14
bar_update_interval = 10
bar_position = top  # Options: top, bottom


# Bar Colors (Hex formats or '-' for default)
bar_color_active_fg = #352738
bar_color_active_bg = #a6d189
bar_color_inactive_fg = #ebdcf0
bar_color_inactive_bg = -
bar_color_bg = #352738
bar_color_fg = #ebdcf0
bar_color_time_fg = -
bar_color_volume_fg = -
bar_color_battery_fg = -

# Bar Module Positions ('l' = left, 'c' = center, 'r' = right)
bar_show_windows = 1
bar_windows_position = l

bar_show_time = 1
bar_time_position = r
bar_time_format = %I:%M %p

bar_show_battery = 1
bar_battery_position = r
bar_battery_path = /sys/class/power_supply/BAT0
bar_battery_icon_full = ´ëÇ
bar_battery_icon_75 = ´ëü
bar_battery_icon_50 = ´ëé
bar_battery_icon_25 = ´ëâ
bar_battery_icon_empty = ´ëä
bar_battery_icon_charging = ´âº

bar_show_volume = 0
bar_volume_position = r
bar_volume_cmd = wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2 * 100)}'
bar_volume_mute_cmd = wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED && echo "yes" || echo "no"
bar_volume_icon_high = ¾░ò¥
bar_volume_icon_med = ¾░ûÇ
bar_volume_icon_low = ¾░ò┐
bar_volume_icon_mute = ¾░Øƒ

